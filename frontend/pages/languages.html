<header>

<h1>🌍 Choisir une langue</h1>

<p>Sélectionnez la langue de votre choix.</p>

</header>

<section>

<h2>Langues disponibles</h2>

<button onclick="changeLanguage('fr')">🇫🇷 Français</button><br><br>

<button onclick="changeLanguage('en')">🇬🇧 English</button><br><br>

<button onclick="changeLanguage('ha')">🇳🇪 Hausa</button><br><br>

<button onclick="changeLanguage('ar')">🇸🇦 العربية</button><br><br>

<button onclick="changeLanguage('es')">🇪🇸 Español</button><br><br>

<button onclick="changeLanguage('pt')">🇵🇹 Português</button><br><br>

<button onclick="changeLanguage('zh')">🇨🇳 中文</button><br><br>

<button onclick="changeLanguage('de')">🇩🇪 Deutsch</button><br><br>

<button onclick="changeLanguage('ru')">🇷🇺 Русский</button><br><br>

<button onclick="changeLanguage('tr')">🇹🇷 Türkçe</button>

</section>

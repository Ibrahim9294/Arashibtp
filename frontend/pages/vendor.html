<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>ARASHI Vendor Center</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="main">

<h1>🛍️ Vendor Center</h1>

<p>Publiez vos produits sur le Marketplace ARASHI.</p>

<form id="vendorForm">

<input
type="text"
id="title"
placeholder="Nom du produit"
required>

<select id="category">

<option value="villas">🏠 Villas</option>

<option value="terrains">🌍 Terrains</option>

<option value="topographie">📐 Topographie</option>

<option value="construction">🏗️ Construction</option>

<option value="materiaux">🧱 Matériaux</option>

<option value="marketplace">🛒 Marketplace</option>

</select>

<textarea
id="description"
placeholder="Description">
</textarea>

<input
type="number"
id="price_pi"
placeholder="Prix en Pi"
required>

<input
type="file"
id="image"
accept="image/*">

<button type="submit">

Publier le produit

</button>

</form>

<div id="status"></div>

</div>

<script src="../js/vendor.js"></script>

</body>

</html>
